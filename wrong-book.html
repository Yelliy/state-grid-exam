<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>错题本</title>
  <!-- 加 ./ 表示当前页面同目录下找assets文件夹 -->
  <link rel="stylesheet" href="./assets/css/common.css">
</head>
<body>
<div class="container">
  <h2>我的错题本</h2>
  <a href="./index.html">返回首页</a>
  <div id="wrongListWrap"></div>
</div>
<!-- JS路径同步加 ./ -->
<script src="./assets/js/core.js"></script>
<script>
function renderWrongList(){
  const wrap = document.getElementById("wrongListWrap");
  const list = WrongBook.getAll();
  if(list.length === 0){
    wrap.innerHTML = "<p>暂无错题</p>";
    return;
  }
  list.forEach(q=>{
    let html = `<div style="margin:16px 0;padding:12px;border:1px solid #eee;border-radius:8px;">
      <h4>${q.title}</h4>`;
    for(let k in q.options){
      html += `<p>${k}. ${q.options[k]}</p>`;
    }
    html += `<p style="color:#00b42a;font-weight:bold;">正确答案：${q.correctAnswer}</p>
    <button onclick="WrongBook.remove(${q.id});location.reload();" style="background:#f53f3f;color:#fff;margin-top:8px;">移出错题本</button>
    </div><hr>`;
    wrap.innerHTML += html;
  })
}
renderWrongList();
</script>
</body>
</html>
